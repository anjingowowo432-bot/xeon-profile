<!DOCTYPE html>
<html lang="id"<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XeonTX - THE VOID</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-red: #ff0000;
            --dark-blood: #8b0000;
            --glow: 0 0 15px var(--primary-red);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none; /* Kursor kustom untuk aura gelap */
        }

        body {
            height: 100vh;
            background: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 2000px;
        }

        /* Ruang 3D Background */
        #scene {
            position: fixed;
            width: 120%;
            height: 120%;
            z-index: -1;
            background: url('https://files.catbox.moe/2q17n2.gif') no-repeat center center;
            background-size: cover;
            filter: brightness(0.4) sepia(100%) hue-rotate(-50deg) saturate(3);
            transition: transform 0.1s ease-out;
        }

        /* Efek Vignette Berdarah */
        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            box-shadow: inset 0 0 200px rgba(0,0,0,0.9), inset 0 0 100px rgba(139,0,0,0.5);
            pointer-events: none;
            z-index: 1;
        }

        /* Container Card Utama */
        .container {
            position: relative;
            z-index: 10;
            transform-style: preserve-3d;
        }

        .card {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(25px);
            padding: 60px 40px;
            border-radius: 2px;
            border: 1px solid var(--dark-blood);
            box-shadow: 0 0 50px rgba(0,0,0,1), 0 0 20px var(--dark-blood);
            text-align: center;
            width: 400px;
            transform-style: preserve-3d;
            animation: floating 4s ease-in-out infinite;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0) rotateX(2deg); }
            50% { transform: translateY(-20px) rotateX(-2deg); }
        }

        /* Profile Glitch Animasi */
        .profile-container {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto 30px;
            transform: translateZ(80px);
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 5px; /* Sedikit kotak agar terlihat lebih agresif */
            border: 2px solid var(--primary-red);
            object-fit: cover;
            box-shadow: var(--glow);
            filter: contrast(1.2);
        }

        .scanline {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: var(--primary-red);
            opacity: 0.5;
            box-shadow: var(--glow);
            animation: scanning 2s linear infinite;
        }

        @keyframes scanning {
            0% { top: 0; } 100% { top: 100%; }
        }

        /* Teks Nama */
        h1 {
            font-family: 'Cinzel Decorative', cursive;
            color: white;
            font-size: 2.5rem;
            text-shadow: 0 0 10px var(--primary-red), 0 0 30px var(--dark-blood);
            margin-bottom: 5px;
            letter-spacing: 5px;
            transform: translateZ(50px);
        }

        p.role {
            font-family: 'Orbitron', sans-serif;
            color: var(--primary-red);
            font-size: 0.7rem;
            letter-spacing: 10px;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        /* Music Bar Animation */
        .music-visualizer {
            display: flex;
            justify-content: center;
            gap: 3px;
            margin-bottom: 20px;
            height: 20px;
        }

        .bar {
            width: 3px;
            background: var(--primary-red);
            animation: barAnim 1s ease-in-out infinite;
        }

        @keyframes barAnim {
            0%, 100% { height: 5px; }
            50% { height: 20px; }
        }

        /* Social Icons */
        .social-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            transform: translateZ(60px);
        }

        .social-item {
            background: rgba(139, 0, 0, 0.1);
            border: 1px solid var(--dark-blood);
            padding: 15px;
            color: white;
            font-size: 1.5rem;
            text-decoration: none;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .social-item::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,0,0,0.4), transparent);
            transition: 0.5s;
        }

        .social-item:hover::before { left: 100%; }

        .social-item:hover {
            background: var(--primary-red);
            box-shadow: var(--glow);
            transform: scale(1.1) translateZ(20px);
        }

        /* Custom Cursor */
        .cursor {
            width: 20px;
            height: 20px;
            border: 2px solid var(--primary-red);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 999;
            box-shadow: var(--glow);
            transition: transform 0.1s;
        }

        /* Control Button */
        .play-toggle {
            background: none;
            border: 1px solid var(--primary-red);
            color: white;
            padding: 10px 20px;
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            letter-spacing: 2px;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .play-toggle:hover {
            background: var(--primary-red);
            color: black;
        }

    </style>
</head>
<body>

    <div class="vignette"></div>
    <div id="scene"></div>
    <div class="cursor"></div>

    <div class="container" id="parallax-container">
        <div class="card">
            <div class="profile-container">
                <div class="scanline"></div>
                <img src="https://files.catbox.moe/lqn6oj.jpg" class="profile-img">
            </div>

            <h1 id="name">XeonTX</h1>
            <p class="role">Xeon Profile</p>

            <div class="music-visualizer" id="visualizer" style="display: none;">
                <div class="bar" style="animation-delay: 0.1s"></div>
                <div class="bar" style="animation-delay: 0.3s"></div>
                <div class="bar" style="animation-delay: 0.2s"></div>
                <div class="bar" style="animation-delay: 0.5s"></div>
                <div class="bar" style="animation-delay: 0.4s"></div>
            </div>

            <button class="play-toggle" onclick="toggleMusic()">PLAY MUSIC</button>

            <div class="social-grid">
                <a href="https://t.me/xeyonn" class="social-item"><i class="fab fa-telegram"></i></a>
                <a href="https://www.tiktok.com/@xeonoah777" class="social-item"><i class="fab fa-tiktok"></i></a>
                <a href="https://www.instagram.com/raxzy_d_viero" class="social-item"><i class="fab fa-instagram"></i></a>
                <a href="https://www.youtube.com/@raxzysS" class="social-item"><i class="fab fa-youtube"></i></a>
                <a href="https://x.com/xeonnVX" class="social-item"><i class="fa-brands fa-x-twitter"></i></a>
                <a href="discord://-/users/853503673898139658" onclick="fallbackDiscord(event)" class="social-item"><i class="fab fa-discord"></i></a>
            </div>
        </div>
    </div>

    <audio id="bgm" loop>
        <source src="https://files.catbox.moe/w0t9fa.mp3" type="audio/mpeg">
    </audio>

    <script>
        const scene = document.getElementById('scene');
        const card = document.querySelector('.card');
        const cursor = document.querySelector('.cursor');
        const audio = document.getElementById('bgm');
        const viz = document.getElementById('visualizer');

        // --- Efek Giroskop & Mouse untuk Background 3D ---
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 20;
            const y = (window.innerHeight / 2 - e.pageY) / 20;
            
            // Gerakan Background (Berlawanan untuk efek kedalaman)
            scene.style.transform = `translateX(${x}px) translateY(${y}px) scale(1.1)`;
            
            // Gerakan Card
            card.style.transform = `rotateY(${-x}deg) rotateX(${y}deg)`;
            
            // Kursor
            cursor.style.left = e.pageX + 'px';
            cursor.style.top = e.pageY + 'px';
        });

        // Support untuk Mobile Gyroscope
        window.addEventListener('deviceorientation', (e) => {
            const x = e.gamma / 2; // kiri-kanan
            const y = e.beta / 2;  // depan-belakang
            scene.style.transform = `translateX(${x}px) translateY(${y}px) scale(1.1)`;
            card.style.transform = `rotateY(${-x}deg) rotateX(${y}deg)`;
        });

        function toggleMusic() {
            if (audio.paused) {
                audio.play();
                viz.style.display = 'flex';
                event.target.innerText = "MUSIC ACTIVE";
            } else {
                audio.pause();
                viz.style.display = 'none';
                event.target.innerText = "MUSIC SILENCED";
            }
        }

        // Discord Fallback: Jika aplikasi tidak ada, buka browser
        function fallbackDiscord(e) {
            const discordUrl = "https://discord.com/users/xeonn_77";
            const start = Date.now();
            
            setTimeout(() => {
                if (Date.now() - start < 2000) {
                    window.open(discordUrl, '_blank');
                }
            }, 500);
        }

        // Glitch effect on name
        setInterval(() => {
            const name = document.getElementById('name');
            name.style.textShadow = Math.random() > 0.9 ? '2px 2px #ff0000, -2px -2px #000' : '0 0 10px #ff0000';
        }, 100);

    </script>
</body>
  </html>
